services:
  rabbitmq:
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  ollama:
    ports:
      - "${OLLAMA_PORT:-11434}:11434"

  api:
    ports:
      - "${API_PORT:-5022}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
