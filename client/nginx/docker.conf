map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    client_max_body_size 200m;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Pass upstream error bodies through (don't swap JSON API errors for nginx HTML pages).
    proxy_intercept_errors off;

    # Docker Compose assigns api a new IP when the container is recreated; a static `upstream { server api; }`
    # resolves only at nginx startup → stale IP → 502. Resolver + variable proxy_pass re-resolve api per request.
    location /api/ {
        resolver               127.0.0.11 ipv6=off valid=10s;
        # Must run before `rewrite ... break`: break stops the rewrite phase, so a later `set` never runs → uninitialized proxy_pass URL.
        set $smartn_backend    http://api:8080;
        rewrite                ^/api/(.*)$ /$1 break;
        proxy_pass             $smartn_backend$uri$is_args$args;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        $connection_upgrade;

        # Large multipart uploads (EPUB/PDF): defaults are too tight — nginx aborts with generic HTML errors.
        proxy_connect_timeout   300s;
        proxy_send_timeout      3600s;
        proxy_read_timeout      3600s;
        proxy_request_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
